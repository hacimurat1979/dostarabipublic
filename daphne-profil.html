<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Daphne — İç Dünyanın Haritası</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LGMR3QK3JT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LGMR3QK3JT');
</script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="viz-root">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("dost-theme");
        var theme = (stored === "light" || stored === "dark")
          ? stored
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.body.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
  <header class="app-header">
    <div class="app-header__title">
      <h1>Daphne</h1>
      <p class="app-header__subtitle"
         data-tr="İç dünyanın haritası -- kendi yazılarında sık sık döndüğü eksenler"
         data-en="A map of the inner world -- the axes her own writing keeps returning to"
         data-pt="Um mapa do mundo interior -- os eixos aos quais sua própria escrita retorna"></p>
    </div>
    <div class="app-header__controls">
      <button class="theme-toggle" id="theme-toggle" type="button" title="Aydınlık / Karanlık mod — Light / Dark mode — Modo claro / escuro" aria-label="Aydınlık / Karanlık mod — Light / Dark mode — Modo claro / escuro">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.6"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="1.5" x2="12" y2="4.2"/><line x1="12" y1="19.8" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="4.2" y2="12"/><line x1="19.8" y1="12" x2="22.5" y2="12"/><line x1="4.4" y1="4.4" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.6" y2="19.6"/><line x1="4.4" y1="19.6" x2="6.3" y2="17.7"/></g></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </button>
      <div class="lang-switch" id="lang-switch"></div>
    </div>
  </header>

  <main>
    <section class="intro" id="intro-text">
      <p data-tr="Bu harita, Dost ile örtüşüp örtüşmediğine bakmaksızın, Daphne'nin (thelivingfractal) kendi yazılarında tekrar tekrar döndüğü eksenleri bir araya getirmeye çalışıyor. Merkezdeki düğüm Daphne, çevresindekiler ise onun kendi cümleleriyle -- mümkün olduğunca -- kurulmuş temel parametreler. Bu kapanmış bir profil değil; yeni bir yazı paylaşıldıkça güncellenen bir taslak. Bir düğüme tıklayın."
         data-en="This map tries to gather, independent of any overlap with Dost, the axes Daphne's (thelivingfractal) own writing keeps returning to. The center node is Daphne; the surrounding ones are core parameters built, as much as possible, from her own words. This is not a closed profile -- it is a draft that updates as new pieces are shared. Click a node."
         data-pt="Este mapa tenta reunir, independentemente de qualquer sobreposição com Dost, os eixos aos quais a própria escrita de Daphne (thelivingfractal) retorna repetidamente. O nó central é Daphne; os que a rodeiam são parâmetros centrais construídos, tanto quanto possível, a partir de suas próprias palavras. Este não é um perfil fechado -- é um rascunho que se atualiza à medida que novos textos são compartilhados. Clique num nó.">
      </p>
    </section>

    <div class="bookmap-tabs" id="profile-tabs" role="tablist">
      <button type="button" class="bookmap-tab bookmap-tab--active" data-tab="map" role="tab" aria-selected="true"
        data-tr="Harita" data-en="Map" data-pt="Mapa"></button>
      <button type="button" class="bookmap-tab" data-tab="articles" role="tab" aria-selected="false"
        data-tr="Taranan Yazılar" data-en="Articles Surveyed" data-pt="Textos Analisados"></button>
    </div>

    <section class="graph-wrap" id="profile-wrap" data-tab-panel="map">
      <svg id="profile-graph"></svg>
      <div class="view-status" id="profile-wrap-status" hidden>
        <div class="view-status__spinner" aria-hidden="true"></div>
        <p class="view-status__text"></p>
        <button class="view-status__retry" type="button" hidden></button>
      </div>
    </section>

    <aside class="detail-panel" id="detail-panel" hidden>
      <button class="detail-panel__close" id="detail-close" aria-label="Kapat">×</button>
      <div id="detail-content"></div>
    </aside>

    <section class="daphne-profile-articles-wrap" id="articles-list-section" data-tab-panel="articles" hidden>
      <div id="articles-list" class="daphne-profile-articles-grid"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p data-tr="Kaynak: thelivingfractal.com ve Substack (thelivingfractal1). Bu bir okuma denemesidir, kapanmış bir teşhis değil."
       data-en="Source: thelivingfractal.com and Substack (thelivingfractal1). This is a reading attempt, not a closed diagnosis."
       data-pt="Fonte: thelivingfractal.com e Substack (thelivingfractal1). Esta é uma tentativa de leitura, não um diagnóstico fechado.">
    </p>
  </footer>

  <script src="assets/vendor/d3.min.js"></script>
  <script src="assets/theme.js"></script>
  <script src="assets/i18n.js"></script>
  <script src="assets/view-status.js"></script>
  <script src="assets/graph-utils.js"></script>
  <script src="assets/daphne-profil.js"></script>
</body>
</html>
