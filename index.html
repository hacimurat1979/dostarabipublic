    <section class="intro" id="intro-text">
      <p id="intro-ontology" data-tr="Bu harita, İbn Arabî'nin 'vahdet-i vücûd' anlayışında varlığın Zât'tan görünen âleme, oradan da tekrar Zât'a nasıl döndüğünü izler. Her düğüm bir mertebeyi, her çizgi ikisi arasındaki ilişkinin tabiatını gösterir. Bir düğüme tıklayın; bağlantılarını takip edin."
         data-en="This map traces how, in Ibn Arabi's understanding of the Unity of Being, existence flows from the Essence to the visible world — and back again. Each node is a level; each line names the nature of the relation between two levels. Click a node and follow its connections."
         data-pt="Este mapa acompanha como, na compreensão de Ibn Arabi sobre a Unidade do Ser, a existência flui da Essência para o mundo visível — e retorna outra vez. Cada nó é um nível; cada linha nomeia a natureza da relação entre dois níveis. Clique em um nó e siga suas conexões.">
      </p>
      <p id="intro-esma" hidden data-tr="Bu harita, Fütûhât-ı Mekkiyye'nin kendi metnine dayanarak, Esmâü'l-Hüsnâ'nın Zât'tan başlayıp aşağıya doğru inen mertebelerini izler. Ortadaki Zât dairesine tıklayarak başlayın; her tıklama bir sonraki mertebeyi açar ve kaynağını, İbn Arabî'nin kendi ifadesini gösterir. Boş bir alanı sürükleyerek gezinebilir, fare tekerleğiyle yakınlaştırıp uzaklaştırabilirsiniz."
         data-en="Drawing on the Futuhat al-Makkiyya's own text, this map traces the ranks of the Beautiful Names as they descend from the Essence. Click the Essence circle in the middle to begin; each click opens the next rank and shows its source and Ibn Arabi's own words. Drag an empty area to pan, and scroll to zoom in or out."
         data-pt="Baseando-se no próprio texto do Futuhat al-Makkiyya, este mapa acompanha as hierarquias dos Belos Nomes conforme descem da Essência. Clique no círculo da Essência no meio para começar; cada clique abre a próxima hierarquia e mostra sua fonte e as próprias palavras de Ibn Arabi. Arraste uma área vazia para navegar e role para aproximar ou afastar.">
      </p>
      <div class="landing-quote" id="landing-quote" aria-live="polite"></div>
