         data-en="Centuries ago, Ibn Arabi described the oneness of Being, the false sovereignty of the self, and the Real's self-disclosure in every form. Daphne arrives at the same truths through systems theory, cybernetics, and a personal journey of transformation. In the constellation below, the golden nodes at the center are the themes where the two worlds overlap — click one."
         data-pt="Séculos atrás, Ibn Arabi descreveu a unicidade do Ser, a falsa soberania do eu e a autorrevelação do Real em cada forma. Daphne chega às mesmas verdades através da teoria dos sistemas, da cibernética e de uma jornada pessoal de transformação. Na constelação abaixo, os nós dourados no centro são os temas onde os dois mundos se sobrepõem — clique em um.">
